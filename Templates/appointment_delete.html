{% extends "base.html" %}

{% block content %}

<h3>Delete Appointment?</h3>

<p>
    {{ appointment.patient.patient_number }}
</p>

<form method="POST">

    {% csrf_token %}

    <button type="submit"
            class="btn btn-danger">
        Delete
    </button>

    <a href="{% url 'appointment_list' %}"
       class="btn btn-secondary">
        Cancel
    </a>

</form>

{% endblock %}
