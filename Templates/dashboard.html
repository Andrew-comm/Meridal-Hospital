{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">
    Dashboard
</h2>

<div class="row">

    <div class="col-md-4">

        <div class="card shadow">

            <div class="card-body">

                <h5>Total Users</h5>

                <h2>
                    {{ total_users }}
                </h2>

            </div>

        </div>

    </div>

    <div class="col-md-4">

        <div class="card shadow">

            <div class="card-body">

                <h5>Logged In User</h5>

                <p>{{ current_user.username }}</p>

                <p>{{ current_user.role }}</p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
