{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

    <div class="card-header">
        <h3>My Profile</h3>
    </div>

    <div class="card-body">

        <table class="table">

            <tr>
                <th>Username</th>
                <td>{{ user.username }}</td>
            </tr>

            <tr>
                <th>First Name</th>
                <td>{{ user.first_name }}</td>
            </tr>

            <tr>
                <th>Last Name</th>
                <td>{{ user.last_name }}</td>
            </tr>

            <tr>
                <th>Email</th>
                <td>{{ user.email }}</td>
            </tr>

            <tr>
                <th>Phone</th>
                <td>{{ user.phone }}</td>
            </tr>

            <tr>
                <th>Role</th>
                <td>{{ user.role }}</td>
            </tr>

        </table>

    </div>

</div>

{% endblock %}
