{% extends 'base.html' %}

{% block content %}

<h2>Patients</h2>

<a href="{% url 'patient_create' %}"
   class="btn btn-primary mb-3">
   Add Patient
</a>

<table class="table table-bordered">

    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Gender</th>
            <th></th>
        </tr>
    </thead>

    <tbody>

        {% for patient in patients %}

        <tr>

            <td>{{ patient.id }}</td>

            <td>
                {{ patient.first_name }}
                {{ patient.last_name }}
            </td>

            <td>{{ patient.phone }}</td>

            <td>{{ patient.gender }}</td>

            <td>

                <a href="{% url 'patient_detail' patient.id %}"
                   class="btn btn-success btn-sm">
                   View
                </a>

            </td>

        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
