{% extends "base.html" %}

{% block content %}

<h2>
    {% if appointment %}
        Edit Appointment
    {% else %}
        Create Appointment
    {% endif %}
</h2>

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit"
            class="btn btn-success">

        Save Appointment

    </button>

</form>

{% endblock %}
