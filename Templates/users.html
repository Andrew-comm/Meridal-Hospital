{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">

    <h2>System Users</h2>

</div>

<div class="card shadow">

    <div class="card-body">

        <table class="table table-bordered table-striped">

            <thead>

                <tr>
                    <th>#</th>
                    <th>Username</th>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Role</th>
                </tr>

            </thead>

            <tbody>

                {% for user in users %}

                <tr>

                    <td>{{ forloop.counter }}</td>

                    <td>
                        {{ user.username }}
                    </td>

                    <td>
                        {{ user.first_name }}
                        {{ user.last_name }}
                    </td>

                    <td>
                        {{ user.email }}
                    </td>

                    <td>
                        {{ user.role }}
                    </td>

                </tr>

                {% empty %}

                <tr>

                    <td colspan="5" class="text-center">
                        No users found.
                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
